<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForexFlow - Macro Dashboard</title>
  <style>
    :root {
      --bg: #0b0d10;
      --card: #14171d;
      --border: #1e2229;
      --text: #e2e4e8;
      --muted: #6b7280;
      --accent: #00b4d8;
      --green: #10b981;
      --red: #ef4444;
      --amber: #f59e0b;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.4; overflow-x: hidden;
    }

    nav { display: flex; align-items: center; gap: 1rem; padding: 0.5rem 1rem; background: #0f1115; border-bottom: 1px solid var(--border); }
    .brand { font-weight: 700; letter-spacing: 1px; color: var(--text); display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; font-size: 0.88rem; }
    .brand::before { content: ''; width: 15px; height: 15px; background: var(--accent); clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); }
    .nav-links { display: flex; gap: 0.15rem; }
    .nav-links a { color: var(--muted); text-decoration: none; padding: 0.25rem 0.65rem; border-radius: 4px; font-size: 0.76rem; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
    .nav-links a:hover { color: var(--text); background: #1e2229; }
    .nav-links a.active { color: var(--accent); background: rgba(0,180,216,0.1); border: 1px solid rgba(0,180,216,0.3); }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 0.6rem; font-size: 0.72rem; color: var(--muted); }
    .live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; display: inline-block; margin-right: 4px; box-shadow: 0 0 4px var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.35} }
    #utc-time { font-variant-numeric: tabular-nums; font-family: var(--font-mono); font-size: 0.72rem; }

    #fx-ticker-wrap { width:100%; background:#080d12; border-bottom:1px solid var(--border); overflow:hidden; line-height:0; }

    /* session strip */
    #sessions { display: flex; border-bottom: 1px solid var(--border); max-width: 1200px; margin: 0 auto; padding: 0 1rem; overflow-x: auto; }
    .session-pill { display: flex; align-items: center; gap: 0.35rem; padding: 0.38rem 0.75rem; font-size: 0.72rem; color: var(--muted); border-right: 1px solid var(--border); white-space: nowrap; }
    .session-pill:first-child { padding-left: 0; }
    .session-pill:last-child { border-right: none; }
    .session-dot { width: 6px; height: 6px; border-radius: 50%; background: #2a3040; flex-shrink: 0; }
    .session-pill.active { color: var(--text); }
    .session-pill.active .session-dot { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .session-name { font-weight: 600; }
    .session-status { color: var(--muted); font-size: 0.63rem; font-family: var(--font-mono); }
    .session-pill.active .session-status { color: var(--green); }

    main { padding: 0.6rem 1rem 1.25rem; max-width: 1200px; margin: 0 auto; }
    .macro-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-top: 0.5rem; }
    .macro-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem; position: relative;
      transition: transform 0.2s, border-color 0.3s;
    }
    .macro-card:hover { transform: translateY(-2px); }
    .macro-card.highlight { border-color: var(--accent); }
    
    .mc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px dashed #2a2e36; }
    .mc-title { font-weight: 700; font-size: 1rem; }
    .mc-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: #1e2229; color: var(--muted); }
    .mc-badge.bull { background: rgba(16,185,129,0.15); color: var(--green); }
    .mc-badge.bear { background: rgba(239,68,68,0.15); color: var(--red); }
    .mc-badge.warn { background: rgba(245,158,11,0.15); color: var(--amber); }
    .mc-badge.gold-badge { white-space: nowrap; min-width: 34px; max-width: 54px; overflow: hidden; text-overflow: clip; text-align: center; padding-left: 6px; padding-right: 6px; }
    .mc-badge.neut { background: #1e2229; color: var(--muted); }

    .mc-row { display: flex; justify-content: space-between; align-items: center; padding: 0.35rem 0; font-size: 0.85rem; }
    .mc-row + .mc-row { border-top: 1px solid #1e2229; }
    .mc-label { color: var(--muted); }
    .mc-val { font-family: var(--font-mono); font-weight: 500; text-align: right; }
    .mc-val.up { color: var(--green); }
    .mc-val.down { color: var(--red); }
    .mc-prev { font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted); margin-left: 6px; }
    .mc-prev::before { content: '←'; margin-right: 3px; font-size: 0.6rem; }


    .mini-badge { font-family: var(--font-mono); font-size: 0.62rem; padding: 1px 5px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); background: rgba(255,255,255,0.025); white-space: nowrap; }
    .mini-badge.bull { color: var(--green); border-color: rgba(16,185,129,0.35); background: rgba(16,185,129,0.08); }
    .mini-badge.bear { color: var(--red); border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.08); }
    .mini-badge.warn { color: var(--amber); border-color: rgba(245,158,11,0.35); background: rgba(245,158,11,0.08); }
 .mini-badge.rsi-bull { color: var(--green); border-color: rgba(16,185,129,0.35); background: rgba(16,185,129,0.08); }
 .mini-badge.rsi-bear { color: var(--red); border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.08); }
 .mini-badge.rsi-warn { color: var(--amber); border-color: rgba(245,158,11,0.35); background: rgba(245,158,11,0.08); }
 .mini-badge.rsi-neut { color: var(--muted); }
    .provider-line { margin-top:0.55rem; color:var(--muted); font-size:0.68rem; font-family:var(--font-mono); display:flex; flex-wrap:wrap; gap:0.35rem; align-items:center; }
    .provider-line .chip { border:1px solid var(--border); border-radius:999px; padding:1px 6px; background:#10141a; color:var(--accent); }
    .bias-subline { width:100%; font-size:0.66rem; color:var(--muted); font-family:var(--font-mono); text-align:right; }
    .regime-score { font-size: 1.5rem; font-weight: 700; margin: 0.5rem 0; }
    .regime-bar { height: 6px; background: #1e2229; border-radius: 3px; overflow: hidden; margin-top: 0.5rem; }
    .regime-fill { height: 100%; width: 50%; transition: width 0.5s, background 0.5s; }
    .regime-fill.pos { background: var(--green); }
    .regime-fill.neg { background: var(--red); }
    .regime-fill.neut { background: var(--muted); }

    .scrape-age { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); white-space: nowrap; }
    .scrape-age strong { color: var(--text); }
    .loader, .error { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.85rem; }
    .error { color: var(--red); background: rgba(239,68,68,0.07); border-radius: 6px; display: none; margin: 0.5rem 0; }
    #refresh-bar { text-align: center; padding: 0.5rem; color: var(--muted); font-size: 0.65rem; border-top: 1px solid var(--border); margin-top: 1rem; }
    .trademark { font-size: 0.6rem; color: #6b7280; margin-top: 0.15rem; }

    @media (max-width: 768px) {
      nav { flex-wrap: wrap; }
      .nav-right { margin-left: 0; width: 100%; justify-content: space-between; }
      #sessions { padding: 0 0.75rem; }
      main { padding: 0.5rem 0.75rem 1rem; }
    }
  
 .gold-compact-grid { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap:4px 8px; margin-top:6px; }
 .gold-compact-item { min-width:0; display:flex; align-items:center; justify-content:space-between; gap:5px; border-bottom:1px solid rgba(148,163,184,0.08); padding:2px 0; font-family:var(--font-mono); font-size:0.64rem; }
 .gold-compact-label { color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
 .gold-compact-val { font-weight:700; white-space:nowrap; }
 .gold-compact-val.up { color:var(--green); }
 .gold-compact-val.down { color:var(--red); }
 .gold-compact-meta { margin-top:6px; display:flex; justify-content:space-between; gap:8px; color:var(--muted); font-family:var(--font-mono); font-size:0.60rem; line-height:1.2; }
 .gold-compact-note { margin-top:4px; color:var(--muted); font-size:0.60rem; line-height:1.25; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
 .eu-country-note { margin-top:0.45rem; color:var(--muted); font-family:var(--font-mono); font-size:0.62rem; }
 .eu-country-row .mc-label { font-size:0.78rem; }
 .eu-country-row .mc-val { font-size:0.80rem; }
</style>

<script>
 // MARKET_REGIME_FORCEFIX_20260515
  // --- Configuration --- 
 const MAIN_PAIR_ORDER = ['eurusd', 'gbpusd', 'xauusd']; 
 const PAIR_LABELS = { 'eurusd':'EUR/USD', 'gbpusd':'GBP/USD', 'xauusd':'XAU/USD' }; 
const SESSIONS = { 
 sydney: { open: 22, close: 7 }, 
 tokyo: { open: 0, close: 9 }, 
 london: { open: 8, close: 17 }, 
 ny: { open: 13, close: 22 } 
 }; 
 let countdown = 60; 
let latestMacroScrapeTime = null;

  // --- Helpers ---
  const fetchJSON = async (url) => {
    try { const r = await fetch(url, { cache: 'no-cache' }); if (!r.ok) throw new Error(`HTTP ${r.status}`); return await r.json(); }
    catch (e) { console.error(`Fetch ${url}:`, e); return null; }
  };

  const fmt = (v, d=2) => Number(v).toFixed(d);
  const pad = (n) => n.toString().padStart(2, '0');

  function escapeHTML(v) {
    return String(v ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
  }
  function firstDefined(obj, keys, fallback=null) {
    if (!obj) return fallback;
    for (const k of keys) {
      const v = obj[k];
      if (v !== undefined && v !== null && v !== '') return v;
    }
    return fallback;
  }
  function normPairKey(pair) {
    return String(pair || '').toLowerCase().replace(/[^a-z]/g, '');
  }
  function normaliseCross(raw) {
    const s = String(raw || '').toLowerCase();
    if (['cross_up','bullish_cross','golden_cross','watch_long'].includes(s)) return 'golden_cross';
    if (['cross_down','bearish_cross','death_cross','watch_short'].includes(s)) return 'death_cross';
    return 'none';
  }
  function getEmaStateForPair(data, pair) {
    const states = data?.ema_20_50_state || {};
    const key = normPairKey(pair);
    return states[key] || states[key.toUpperCase()] || states[pair] || null;
  }
  function emaSourceLabel(ema) {
    const src = firstDefined(ema, ['source','data_source','history_source'], '');
    return src ? String(src).replace(/^stooq_h1\+/, '').replace(/_/g, ' ').toUpperCase() : '';
  }
  function buildEmaBadge(ema) {
    if (!ema) return '';
    const cross = normaliseCross(firstDefined(ema, ['ema_cross_signal','cross','suggestion'], 'none'));
    const bias = firstDefined(ema, ['trend_bias','bias'], 'neutral_bias');
    const warming = ema.warming_up === true || ema.ok === false;
    const src = emaSourceLabel(ema);
    let cls = '', label = '· EMA';
    if (warming) { cls = 'warn'; label = '· WARM'; }
    else if (cross === 'golden_cross') { cls = 'bull'; label = '↑ CROSS'; }
    else if (cross === 'death_cross') { cls = 'bear'; label = '↓ CROSS'; }
    else if (bias === 'bullish_bias') { cls = 'bull'; label = '↑ EMA'; }
    else if (bias === 'bearish_bias') { cls = 'bear'; label = '↓ EMA'; }
    const title = `EMA · ${cross} · ${bias}${src ? ' · ' + src : ''}`;
    return `<span class="mini-badge ${cls}" title="${escapeHTML(title)}">${label}</span>`;
  }
  function getRsiStateForPair(data, pair) {
 const key = normPairKey(pair);
 const indicators = data?.price_indicators || data?.price_daily_indicators || {};
 const ctx = data?.price_context?.[key] || data?.pair_biases?.[key]?.price_context || {};
 const ind = indicators[key] || indicators[key.toUpperCase()] || {};
 const rsiRaw = firstDefined(ind, ['rsi14','rsi','RSI'], firstDefined(ctx, ['rsi14','rsi','RSI'], null));
 const rsi = Number(rsiRaw);
 const state = String(firstDefined(ind, ['rsi_state','state'], firstDefined(ctx, ['rsi_state','state'], '')) || '').toLowerCase();
 const bias = String(firstDefined(ind, ['rsi_bias','bias'], firstDefined(ctx, ['rsi_bias','bias'], '')) || '').toLowerCase();
 const alignment = String(firstDefined(ind, ['rsi_alignment','alignment'], firstDefined(ctx, ['rsi_alignment','alignment'], '')) || '').toLowerCase();
 const source = String(firstDefined(ind, ['source','indicator_source','rsi_source'], firstDefined(ctx, ['rsi_source','source'], '')) || '');
 return { rsi, state, bias, alignment, source };
 }
 function buildRsiBadge(rsiCtx) {
 if (!rsiCtx || !Number.isFinite(rsiCtx.rsi)) return '<span class="mini-badge rsi-neut" title="RSI unavailable">RSI --</span>';
 let cls = 'rsi-neut';
 let label = `RSI ${rsiCtx.rsi.toFixed(0)}`;
 const state = String(rsiCtx.state || '').toLowerCase();
 const bias = String(rsiCtx.bias || '').toLowerCase();
 const alignment = String(rsiCtx.alignment || '').toLowerCase();
 if (state === 'overbought' || state === 'oversold') cls = 'rsi-warn';
 else if (bias === 'bullish' || alignment === 'with') cls = 'rsi-bull';
 else if (bias === 'bearish' || alignment === 'against') cls = 'rsi-bear';
 const titleBits = [`RSI14 ${rsiCtx.rsi.toFixed(2)}`];
 if (state) titleBits.push(state);
 if (bias) titleBits.push(bias);
 if (alignment) titleBits.push(`alignment ${alignment}`);
 if (rsiCtx.source) titleBits.push(String(rsiCtx.source).replace(/_/g, ' '));
 return `<span class="mini-badge ${cls}" title="${escapeHTML(titleBits.join(' · '))}">${label}</span>`;
 }
 function providerPolicyLabel(policy) {
    if (!policy) return '';
    return String(policy).replace('Twelve Data primary -> EODData fallback', 'TD→EOD')
                         .replace('TwelveData primary -> EODData fallback', 'TD→EOD')
                         .replace('momentum: ', '')
                         .replace('; pivot: ', ' · pivot: ');
  }
function toMYT(isoStr) {
      try {
        const d = new Date(isoStr);
        const myt = new Date(d.getTime() + 8 * 3600 * 1000);
        const hh = String(myt.getUTCHours()).padStart(2, '0');
        const mm = String(myt.getUTCMinutes()).padStart(2, '0');
        const dd = myt.getUTCDate();
        const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][myt.getUTCMonth()];
        return `${dd} ${mon} ${hh}:${mm} MYT`;
      } catch (_) { return '--'; }
    }

    function relTimeMYT(isoStr) {
      try {
        if (!isoStr) return '--';
        const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
        if (!Number.isFinite(diff)) return '--';
        let rel;
        if (diff <= 0) rel = 'just now';
        else if (diff < 60) rel = `${diff}s ago`;
        else {
          const m = Math.floor(diff / 60);
          if (m < 60) rel = `${m}m ago`;
          else {
            const h = Math.floor(m / 60);
            const rm = m % 60;
            rel = h < 24 ? (rm ? `${h}h ${rm}m ago` : `${h}h ago`) : `${Math.floor(h / 24)}d ago`;
          }
        }
        return `${rel} (${toMYT(isoStr)})`;
      } catch (_) { return '--'; }
    }

  function updateScrapeAge(generatedIso = null) {
    if (generatedIso !== null) latestMacroScrapeTime = generatedIso;
    const gel = document.getElementById('macro-generated-age');
    if (gel) gel.innerHTML = `Generated <strong>${relTimeMYT(latestMacroScrapeTime)}</strong>`;
  }

  // --- Clock & Sessions ---
  function updateClock() {
    const now = new Date();
    const myt = new Date(now.getTime() + 8 * 3600 * 1000);
    document.getElementById('utc-time').textContent = myt.toISOString().split('T')[1].split('.')[0] + ' MYT';
    const h = now.getUTCHours();
    const m = now.getUTCMinutes();
    const currentMin = h * 60 + m;

    Object.entries(SESSIONS).forEach(([key, {open, close}]) => {
      const openMin = open * 60;
      const closeMin = close * 60;
      let isOpen, minsLeft;
      if (open < close) {
        isOpen = currentMin >= openMin && currentMin < closeMin;
        minsLeft = isOpen ? closeMin - currentMin : (openMin + 1440 - currentMin) % 1440;
      } else {
        isOpen = currentMin >= openMin || currentMin < closeMin;
        minsLeft = isOpen ? (currentMin >= openMin ? (1440 - currentMin) + closeMin : closeMin - currentMin) : openMin - currentMin;
      }
      const hLeft = Math.floor(minsLeft / 60);
      const mLeft = minsLeft % 60;
      const card = document.querySelector(`[data-session="${key}"]`);
      const statusEl = card.querySelector('.session-status');
      if (isOpen) {
        card.classList.add('active');
        statusEl.textContent = `${hLeft}h ${pad(mLeft)}m`;
      } else {
        card.classList.remove('active');
        statusEl.textContent = 'Closed';
      }
    });
  }

  // --- Macro Rendering ---
  function renderMacro(data) { 
 const grid = document.getElementById('macro-grid'); 
 const loader = document.getElementById('loader'); 
 const errorBox = document.getElementById('error-box'); 
 grid.innerHTML = ''; 
 grid.style.display = 'none'; 
 errorBox.style.display = 'none'; 
 if (!data) { 
  loader.style.display = 'none'; 
  errorBox.textContent = 'No macro data available. Run scraper.py.'; 
  errorBox.style.display = 'block'; 
  return; 
 } 
 const ind = data.indicators || {}; 
 const dq = data.data_quality || {}; 
 const regime = data.regime || 'neutral'; 
 const regimeConf = Number(data.regime_confidence ?? 0.5); 
 const horizon = data.signal_horizon || 'medium'; 
 const spx = data.spx || {}; 
 const biases = data.pair_biases || data.biases || data.pairBiases || data._prev_scores || data.price_momentum || {}; 
 const pCtx = data.price_context || {}; 
 const prev = data.prev_rates || {}; 
 const sources = data.sources || {}; 
 const providerPolicy = firstDefined(sources, ['provider_policy'], ''); 
 const momentumModule = firstDefined(sources, ['momentum_module'], ''); 
 const pivotModule = firstDefined(sources, ['pivot_module'], ''); 
 const mainPairs = Array.isArray(data.main_pairs) && data.main_pairs.length ? data.main_pairs.map(p => String(p).toLowerCase()) : MAIN_PAIR_ORDER; 
 const orderedMainPairs = MAIN_PAIR_ORDER.filter(p => mainPairs.includes(p)); 
 const orderedBiasList = orderedMainPairs.map(pairKey => [pairKey, biases[pairKey] || {}]);
 const finiteNumber = (v) => {
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
 };
 const factorDerivedScore = (b) => {
  if (!b || typeof b !== 'object') return null;
  // If backend score was crushed to 0.00 by unavailable price_context,
  // recover the useful pre-context macro bias from weighted_factors.
  // macro.py scoring uses tanh(raw / 2) * 3, so mirror that shape here.
  const wf = b.weighted_factors && typeof b.weighted_factors === 'object' ? b.weighted_factors : null;
  if (wf) {
   const vals = Object.values(wf).map(Number).filter(Number.isFinite);
   if (vals.length) {
    const raw = vals.reduce((a, v) => a + v, 0);
    const score = Math.tanh(raw / 2) * 3;
    if (Number.isFinite(score) && Math.abs(score) > 0.001) return score;
   }
  }
  const f = b.factors && typeof b.factors === 'object' ? b.factors : null;
  if (f) {
   const vals = Object.values(f).map(Number).filter(Number.isFinite);
   if (vals.length) {

function buildDashboardMacroPayload(macro, cachedMacro) {
 const base = (cachedMacro && typeof cachedMacro === 'object') ? cachedMacro : {};
 const live = (macro && typeof macro === 'object') ? macro : {};
 const out = { ...base, ...live };
 out.sources = { ...(base.sources || {}), ...(live.sources || {}) };

 // Fix: do not let a fresh-but-scoreless macro_components.json wipe the scored
 // pair_biases from macro_cache.json. This prevents MARKET REGIME showing 0.00
 // when backend/cached pair scores are available.
 const liveBiases = live.pair_biases || live.biases || live.pairBiases || {};
 const baseBiases = base.pair_biases || base.biases || base.pairBiases || {};
 const mergedBiases = { ...baseBiases, ...liveBiases };
 if (Object.keys(mergedBiases).length) {
  out.pair_biases = mergedBiases;
  out.biases = mergedBiases;
 }

 out._prev_scores = { ...(base._prev_scores || base.prev_scores || {}), ...(live._prev_scores || live.prev_scores || {}) };
 out.price_momentum = { ...(base.price_momentum || {}), ...(live.price_momentum || {}) };
 out.price_context = { ...(base.price_context || {}), ...(live.price_context || {}) };
 out.ema_20_50_state = { ...(base.ema_20_50_state || {}), ...(live.ema_20_50_state || {}) };
 out.main_pairs = live.main_pairs || base.main_pairs || out.main_pairs;
 return out;
}

      const currentGoldValid = Number(macro?.gold?.valid_count ?? 0);
      const cachedGoldValid = Number(cachedGold?.valid_count ?? 0);
      if (cachedGold && (!macro.gold || cachedGoldValid > currentGoldValid)) {
        macro.gold = cachedGold;
      }
      if (cachedMacro?.eu?.country_pmi && !macro?.eu?.country_pmi) {
   macro.eu = { ...(macro.eu || {}), country_pmi: cachedMacro.eu.country_pmi };
  }
  if (cachedMacro.sources) {
        macro.sources = { ...(macro.sources || {}), ...cachedMacro.sources };
      }
    }
    // ── Merge pivot_levels.json into price_context ─────────────────────────
    // pivot_levels.json is written by pivot.py fetch_price_structure() and is
    // the authoritative source for daily pivot levels. If macro_components.json
    // has missing or "unavailable" price_context entries, fill them in from here.
    if (macro && pivotLevels?.pairs) {
      macro.price_context = macro.price_context || {};
      for (const [pair, pdata] of Object.entries(pivotLevels.pairs)) {
        const existing = macro.price_context[pair];
        const isUnavailable = !existing || existing.price_state === 'unavailable' || existing.ohlc_source === 'unavailable';
        if (isUnavailable && pdata?.price_state && pdata.price_state !== 'unavailable') {
          macro.price_context[pair] = pdata;
        }
        // Also patch into pair_biases[pair].price_context
        if (macro.pair_biases?.[pair]) {
          const bCtx = macro.pair_biases[pair].price_context;
          const bUnavailable = !bCtx || bCtx.price_state === 'unavailable' || bCtx.ohlc_source === 'unavailable';
          if (bUnavailable && pdata?.price_state && pdata.price_state !== 'unavailable') {
            macro.pair_biases[pair].price_context = pdata;
          }
        }
      }
    }
    if (!macro && !macroCache) {
      updateScrapeAge(null);
      document.getElementById('loader').style.display = 'none';
      document.getElementById('error-box').textContent = 'Failed to load any data.';
      document.getElementById('error-box').style.display = 'block';
      return;
    }
    const generatedIso = macro?.generated_at ?? macro?.scrape_time ?? null;
    updateScrapeAge(generatedIso);

    const dashboardMacro = buildDashboardMacroPayload(macro, cachedMacro);
 if (dashboardMacro && Object.keys(dashboardMacro).length) renderMacro(dashboardMacro);
    countdown = 60;
  }

  function tick() {
    document.getElementById('countdown').textContent = countdown;
    if (countdown <= 0) refreshData();
    else countdown--;
  }

  updateClock();
  updateScrapeAge();
  setInterval(() => { updateClock(); updateScrapeAge(); }, 1000);
  refreshData();
  setInterval(tick, 1000);
</script>

</body>
</html>
