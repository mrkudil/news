  <!-- Updated for live-only pivot.py: ATR confirmation + pivot-zone entry/SL/TP; FX Pricing ticker replaced; sessions strip added --><style>
    :root {
      --bg:#0b0d10; --panel:#111419; --card:#14171d; --border:#232833;
      --text:#e5e7eb; --muted:#7b8494; --soft:#9aa4b5;

    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif;line-height:1.4;overflow-x:hidden}
    nav{display:flex;align-items:center;gap:1rem;padding:.55rem 1rem;background:#0f1115;border-bottom:1px solid var(--border)}
    .brand{font-weight:800;letter-spacing:.08em;font-size:.88rem;display:flex;align-items:center;gap:.45rem}
    .brand:before{content:"";width:15px;height:15px;background:var(--cyan);clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%)}
    .nav-links{display:flex;gap:.2rem;flex-wrap:wrap}.nav-links a{color:var(--muted);text-decoration:none;padding:.28rem .65rem;border-radius:5px;font-size:.75rem;font-weight:650}.nav-links a.active{color:var(--cyan);background:rgba(0,180,216,.1);border:1px solid rgba(0,180,216,.3)}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:.65rem;color:var(--muted);font-family:var(--mono);font-size:.72rem}.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);margin-right:5px;animation:pulse 1.8s infinite}@keyframes pulse{50%{opacity:.35}}

    /* session strip */
    #sessions{display:flex;border-bottom:1px solid var(--border);max-width:1220px;margin:0 auto;padding:0 1rem;overflow-x:auto;background:var(--bg)}
    .session-pill{display:flex;align-items:center;gap:.35rem;padding:.38rem .75rem;font-size:.72rem;color:var(--muted);border-right:1px solid var(--border);white-space:nowrap}
    .session-pill:first-child{padding-left:0}.session-pill:last-child{border-right:none}
    .session-dot{width:6px;height:6px;border-radius:50%;background:#2a3040;flex-shrink:0}
    .session-pill.active{color:var(--text)}.session-pill.active .session-dot{background:var(--green);box-shadow:0 0 4px var(--green)}
    .session-name{font-weight:700}.session-status{color:var(--muted);font-size:.63rem;font-family:var(--mono)}.session-pill.active .session-status{color:var(--green)}
    #fx-pricing-widget-copyright{text-align:center;font-size:13px;font-family:sans-serif;margin-top:10px;margin-bottom:10px;color:#9db2bd}#fx-pricing-widget-copyright a{text-decoration:unset;color:#bb3534;font-weight:600}
    main{max-width:1220px;margin:0 auto;padding:.7rem 1rem 1.25rem}.topline{display:flex;align-items:center;justify-content:flex-end;margin-bottom:.55rem}.age{font-family:var(--mono);font-size:.68rem;color:var(--muted)}.age strong{color:var(--text)}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1rem;max-width:1160px;margin:0 auto}.card{background:var(--card);border:1px solid var(--border);border-radius:11px;overflow:hidden;min-width:0}.card.kill{border-color:var(--amber);box-shadow:0 0 0 1px rgba(245,158,11,.12)}.card.missing{border-color:rgba(239,68,68,.38)}
    .head{display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem;background:var(--panel);border-bottom:1px solid var(--border);padding:.8rem 1rem}.pair{font-weight:850;font-size:1.12rem;line-height:1.75}.right{text-align:right;display:flex;flex-direction:column;gap:.32rem;align-items:flex-end}.price{font-family:var(--mono);font-size:1.08rem;font-weight:800}.arrow{font-size:.75rem;margin-left:.35rem}.arrow.up{color:var(--green)}.arrow.down{color:var(--red)}
    .badge{font-family:var(--mono);font-size:.65rem;padding:3px 8px;border-radius:5px;background:#1a1f28;border:1px solid var(--border);white-space:nowrap;color:var(--muted)}.badge.bull{color:var(--green);border-color:rgba(16,185,129,.35);background:rgba(16,185,129,.08)}.badge.bear{color:var(--red);border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.08)}.badge.neutral{color:var(--muted)}
    .ladder{position:relative;padding:.55rem 1rem .85rem;display:flex;flex-direction:column}.rail{position:absolute;left:28px;top:13px;bottom:13px;width:2px;background:#242a35}.rail:after{content:"";position:absolute;inset:0 -3px;background:linear-gradient(to bottom,rgba(16,185,129,.5),transparent 46%,transparent 54%,rgba(239,68,68,.5));border-radius:3px}
    .row{display:grid;grid-template-columns:32px 30px 1fr auto;gap:.42rem;align-items:center;position:relative;padding:.35rem 0;font-size:.82rem}.row+.row{border-top:1px dashed #202631}.dot{width:13px;height:13px;border:2px solid;margin-left:10px;border-radius:50%;display:flex;align-items:center;justify-content:center}.dot:after{content:"";width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.65}.dot.r,.label.r{color:var(--green)}.dot.s,.label.s{color:var(--red)}.dot.pp,.label.pp{color:var(--cyan)}.dot.h,.label.h{color:#f87171;border-style:dashed}.dot.l,.label.l{color:#60a5fa;border-style:dashed}.dot.c,.label.c{color:#facc15;border-style:dashed}.dot.touched,.label.touched{color:var(--amber)!important;border-color:var(--amber)!important}.label{font-weight:800;font-size:.76rem}.lvl-price{font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.yday .lvl-price{color:var(--muted)}.dist{font-family:var(--mono);font-size:.72rem;color:var(--muted);padding:2px 8px;border-radius:5px;background:#1a1f28}.dist.near{color:var(--cyan);background:rgba(0,180,216,.13);font-weight:750}.dist.kill{color:var(--amber);background:rgba(245,158,11,.18);font-weight:850;animation:glow 1.4s infinite}@keyframes glow{50%{box-shadow:0 0 10px rgba(245,158,11,.45)}}
    .now{display:flex;align-items:center;gap:.5rem;margin:.35rem 0;padding:.42rem .62rem;border:1px solid rgba(0,180,216,.28);border-radius:7px;background:rgba(0,180,216,.08);position:relative}.now:before{content:"▶";position:absolute;left:-8px;color:var(--cyan);font-size:.7rem}.now-label{font-size:.62rem;letter-spacing:.08em;color:var(--cyan);font-weight:850}.now-price{font-family:var(--mono);font-weight:850}.now.flash-up{border-color:rgba(16,185,129,.65);background:rgba(16,185,129,.12)}.now.flash-down{border-color:rgba(239,68,68,.65);background:rgba(239,68,68,.12)}
    .box{margin-top:.55rem;padding:.65rem .72rem;border:1px solid #202735;border-radius:9px;background:#0f141b;display:grid;gap:.42rem}.line{display:flex;align-items:center;justify-content:space-between;gap:.6rem;font-size:.77rem}.signal{display:inline-flex;align-items:center;gap:.4rem;flex-wrap:wrap}.signal.bull{color:var(--green)}.signal.bear{color:var(--red)}.signal.neutral{color:var(--muted)}.signal.reject{color:var(--amber)}.tag{font-family:var(--mono);font-size:.64rem;border:1px solid #202733;background:#151a22;border-radius:999px;padding:.16rem .45rem;color:var(--muted);white-space:nowrap}.tag.bull,.tag.with{color:var(--green);border-color:rgba(16,185,129,.28);background:rgba(16,185,129,.09)}.tag.bear,.tag.against{color:var(--red);border-color:rgba(239,68,68,.28);background:rgba(239,68,68,.09)}.tag.warn,.tag.overbought,.tag.oversold{color:var(--amber);border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.1)}
    .rsi,.ema,.atr,.plan{border-top:1px solid #202735;margin-top:.05rem;padding-top:.42rem;display:grid;gap:.3rem;font-family:var(--mono);font-size:.68rem}.rsi-row,.ema-row,.atr-row,.plan-row{display:flex;align-items:center;justify-content:space-between;gap:.45rem}.rsi-label,.ema-label,.atr-label,.plan-label{color:var(--muted);min-width:62px}.rsi-val,.ema-val,.atr-val,.plan-val{font-weight:850}.plan-note{color:var(--muted);font-size:.61rem;line-height:1.25}.tag.live{color:var(--cyan);border-color:rgba(0,180,216,.35);background:rgba(0,180,216,.09)}.tag.valid{color:var(--green);border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.09)}.meter{height:5px;border-radius:999px;overflow:hidden;background:linear-gradient(to right,rgba(239,68,68,.42) 0 30%,rgba(107,114,128,.3) 30% 70%,rgba(16,185,129,.42) 70%)}.meter-fill{height:100%;background:rgba(229,231,235,.75);border-radius:inherit}.source{padding:.2rem .65rem 0;color:var(--muted);font-family:var(--mono);font-size:.66rem}.loader,.error{text-align:center;padding:2rem;color:var(--muted)}.error{color:var(--red);display:none}.missing-box{padding:.9rem;border:1px dashed rgba(239,68,68,.35);border-radius:8px;background:rgba(239,68,68,.06);color:var(--muted);font-family:var(--mono);font-size:.72rem}.missing-title{color:#fca5a5;font-weight:850;margin-bottom:.4rem}
    footer{text-align:center;border-top:1px solid var(--border);padding:.55rem;color:var(--muted);font-size:.65rem}.tm{font-size:.6rem;margin-top:.12rem}
    @media(max-width:1100px){.grid{grid-template-columns:repeat(2,minmax(0,1fr));max-width:780px}}@media(max-width:720px){nav{flex-wrap:wrap}.nav-right{width:100%;margin-left:0;justify-content:space-between}.grid{grid-template-columns:1fr;max-width:430px}main{padding:.6rem .75rem 1rem}}

<script>
const PAIRS = ['eurusd','gbpusd','xauusd'];
const LABEL = {eurusd:'EUR/USD',gbpusd:'GBP/USD',xauusd:'XAU/USD'};
const DEC = {eurusd:5,gbpusd:5,xauusd:2};
const PIP = {eurusd:10000,gbpusd:10000,xauusd:10};
const SESSIONS = {sydney:{open:22,close:7},tokyo:{open:0,close:9},london:{open:8,close:17},ny:{open:13,close:22}};
let countdown = 60;
let previousLive = {};
let latestGenerated = null;

async function fetchJSON(url){try{const r=await fetch(url,{cache:'no-store'}); if(!r.ok) throw new Error(`HTTP ${r.status}`); return await r.json();}catch(e){console.warn(`Fetch failed ${url}`,e); return null;}}
function n(v){const x=Number(v); return Number.isFinite(x)?x:NaN;}
function pad(v){return String(v).padStart(2,'0');}
function fmt(v,d=5){const x=n(v); return Number.isFinite(x)?x.toFixed(d):'--';}
function pips(diff,pair){return Math.round(diff*(PIP[pair]||10000)*10)/10;}
function html(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function text(obj,keys,fallback=''){if(!obj)return fallback; for(const k of keys){const v=obj[k]; if(v!==undefined&&v!==null&&String(v).trim()!=='')return String(v);} return fallback;}
function val(obj,keys,fallback=NaN){if(!obj)return fallback; for(const k of keys){const v=n(obj[k]); if(Number.isFinite(v))return v;} return fallback;}
// Derive previous daily High/Low when pivot_levels.json does not include raw high/low.
// Classical pivots: L = (2 * PP) - R1 and H = (2 * PP) - S1.
function derivedDailyHigh(pv){
 const direct = val(pv,['high','High','H','yH','prev_high','previous_high','daily_high'],NaN);
 if(Number.isFinite(direct)) return direct;
 const pp = val(pv,['PP','pp'],NaN), s1 = val(pv,['S1','s1'],NaN);
 if(Number.isFinite(pp) && Number.isFinite(s1)) return (2 * pp) - s1;
 const low = derivedDailyLow(pv), range = val(pv,['range'],NaN);
 if(Number.isFinite(low) && Number.isFinite(range)) return low + range;
 return NaN;
}
function derivedDailyLow(pv){
 const direct = val(pv,['low','Low','L','yL','prev_low','previous_low','daily_low'],NaN);
 if(Number.isFinite(direct)) return direct;
 const pp = val(pv,['PP','pp'],NaN), r1 = val(pv,['R1','r1'],NaN);
 if(Number.isFinite(pp) && Number.isFinite(r1)) return (2 * pp) - r1;
 const high = val(pv,['high','High','H','yH','prev_high','previous_high','daily_high'],NaN), range = val(pv,['range'],NaN);
 if(Number.isFinite(high) && Number.isFinite(range)) return high - range;
 return NaN;
}
function first(obj,keys,fallback=null){if(!obj)return fallback; for(const k of keys){if(obj[k]!==undefined&&obj[k]!==null&&String(obj[k]).trim()!=='')return obj[k];} return fallback;}
function toMYT(iso){try{const d=new Date(iso); const m=new Date(d.getTime()+8*3600*1000); const mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m.getUTCMonth()]; return `${m.getUTCDate()} ${mon} ${String(m.getUTCHours()).padStart(2,'0')}:${String(m.getUTCMinutes()).padStart(2,'0')} MYT`;}catch{return '--';}}
function relTime(iso){try{if(!iso)return'--'; const diff=Math.floor((Date.now()-new Date(iso).getTime())/1000); if(!Number.isFinite(diff))return'--'; let r;if(diff<5)r='just now'; else if(diff<60)r=`${diff}s ago`; else if(diff<3600)r=`${Math.floor(diff/60)}m ago`; else if(diff<86400){const h=Math.floor(diff/3600),m=Math.floor((diff%3600)/60);r=m?`${h}h ${m}m ago`:`${h}h ago`;} else r=`${Math.floor(diff/86400)}d ago`; return `${r} (${toMYT(iso)})`;}catch{return'--';}}
function updateClock(){
  const now = new Date();
  const myt = new Date(now.getTime()+8*3600*1000);
  document.getElementById('clock').textContent = myt.toISOString().split('T')[1].split('.')[0] + ' MYT';
  if(latestGenerated)document.getElementById('generated-age').innerHTML=`Generated <strong>${relTime(latestGenerated)}</strong>`;
  const currentMin = now.getUTCHours()*60 + now.getUTCMinutes();
  Object.entries(SESSIONS).forEach(([key,{open,close}])=>{
    const openMin=open*60, closeMin=close*60; let isOpen, minsLeft;
    if(open < close){isOpen=currentMin>=openMin&&currentMin<closeMin; minsLeft=isOpen?closeMin-currentMin:(openMin+1440-currentMin)%1440;}
    else{isOpen=currentMin>=openMin||currentMin<closeMin; minsLeft=isOpen?(currentMin>=openMin?(1440-currentMin)+closeMin:closeMin-currentMin):openMin-currentMin;}
    const card=document.querySelector(`[data-session="${key}"]`); if(!card)return;
    const statusEl=card.querySelector('.session-status'); const hLeft=Math.floor(minsLeft/60), mLeft=minsLeft%60;
    if(isOpen){card.classList.add('active'); if(statusEl)statusEl.textContent=`${hLeft}h ${pad(mLeft)}m`;}
    else{card.classList.remove('active'); if(statusEl)statusEl.textContent='Closed';}
  });
}
function liveMap(rates){const out={}; const rev=Object.fromEntries(Object.entries(LABEL).map(([k,v])=>[v,k])); (rates?.rates||[]).forEach(r=>{const key=String(r.pair||r.key||r.symbol||'').toLowerCase().replace(/[^a-z0-9]/g,''); const mapped=PAIRS.includes(key)?key:rev[String(r.label||'').trim()]; const rate=n(r.rate); if(mapped&&Number.isFinite(rate))out[mapped]=rate;}); return out;}
function toneFrom(score,state,align){if(state==='rejection')return'reject'; if(align==='with')return score>=0?'bull':'bear'; if(align==='against')return score>=0?'bear':'bull'; if((state||'').includes('above')||(state||'').includes('up'))return'bull'; if((state||'').includes('below')||(state||'').includes('down'))return'bear'; return'neutral';}
function prettyState(state,nearest){return ({unavailable:'live price unavailable',accept_above_pp:'accept above PP',accept_below_pp:'accept below PP',balance:'balance around PP',rejection:nearest?`rejection at ${nearest}`:'rejection',breakout_up:nearest?`breakout above ${nearest}`:'breakout up',breakout_down:nearest?`breakout below ${nearest}`:'breakout down'})[state]||'no structure signal';}
function rsiClass(v){v=String(v||'unavailable').toLowerCase(); if(['bullish','with'].includes(v))return'bull'; if(['bearish','against'].includes(v))return'bear'; if(['overbought','oversold'].includes(v))return'warn'; return'neutral';}
function getEma(macro,pair){const s=macro?.ema_20_50_state||{}; return s[pair]||s[pair.toUpperCase()]||null;}
function getRsi(pv,ctx,ema){
  let r=val(pv,['rsi','RSI','rsi14'],val(ctx,['rsi','RSI','rsi14'],NaN));
  let tf='D1', period=val(pv,['rsi_period'],val(ctx,['rsi_period'],14));
  let state=text(pv,['rsi_state'],text(ctx,['rsi_state'],'unavailable')).toLowerCase();
  let bias=text(pv,['rsi_bias'],text(ctx,['rsi_bias'],'unavailable')).toLowerCase();
  let align=text(pv,['rsi_alignment'],text(ctx,['rsi_alignment'],'unavailable')).toLowerCase();
  let mult=val(pv,['rsi_confluence_mult'],val(ctx,['rsi_confluence_mult'],NaN));
  let source=text(pv,['rsi_source'],text(ctx,['rsi_source'],''));
  if(!Number.isFinite(r)&&ema){
    const h1=val(ema,['h1_rsi','h1_rsi14','rsi14'],NaN);
    if(Number.isFinite(h1)){r=h1;tf='H1';period=val(ema,['h1_rsi_period'],14);state=text(ema,['h1_rsi_label'],'neutral').toLowerCase();bias=text(ema,['h1_rsi_signal'],'neutral').toLowerCase();align='neutral';source=text(ema,['source','history_source'],'h1_ema');}
  }
  return {r,tf,period,state,bias,align,mult,source};
}
function rsiBlock(x){if(!Number.isFinite(x.r))return `<div class="rsi"><div class="rsi-row"><span class="rsi-label">${x.tf||'D1'} RSI ${Math.round(x.period||14)}</span><span class="tag neutral">unavailable</span></div></div>`; const mw=Math.max(0,Math.min(100,x.r)); const mt=Number.isFinite(x.mult)&&x.mult>0?` ×${x.mult.toFixed(2)}`:''; return `<div class="rsi"><div class="rsi-row"><span class="rsi-label">${x.tf} RSI ${Math.round(x.period||14)}</span><span class="rsi-val">${x.r.toFixed(2)}</span><span><span class="tag ${rsiClass(x.state)}">${html(x.state)}</span> <span class="tag ${rsiClass(x.bias)}">${html(x.bias)}</span> <span class="tag ${rsiClass(x.align)}">${x.align==='with'?'with pivot':x.align==='against'?'against pivot':html(x.align)}${mt}</span></span></div><div class="meter" title="${html(x.source||'')}"><div class="meter-fill" style="width:${mw}%"></div></div></div>`;}
function emaBlock(ema,pair){if(!ema)return''; if(ema.ok===false||ema.warming_up)return`<div class="ema"><div class="ema-row"><span class="ema-label">H1 EMA</span><span class="ema-val" style="color:var(--muted)">warming up…</span></div></div>`; const d=DEC[pair]||5; const fast=val(ema,['ema_fast','fast_ema','ema20','ema_20'],NaN), slow=val(ema,['ema_slow','slow_ema','ema50','ema_50'],NaN); const fp=Math.round(val(ema,['fast_period'],20)), sp=Math.round(val(ema,['slow_period'],50)); const pvF=text(ema,['current_vs_fast','price_vs_fast','current_vs_ema20','close_vs_ema20'],''); const pvS=text(ema,['current_vs_slow','price_vs_slow','current_vs_ema50','close_vs_ema50'],''); const bias=text(ema,['trend_bias','bias'],'neutral_bias').replace(/_/g,' '); const src=text(ema,['source','history_source'],''); const tag=r=>r?`<span class="tag ${r==='above'?'bull':r==='below'?'bear':'warn'}">${html(r)}</span>`:''; return `<div class="ema"><div class="ema-row"><span class="ema-label">H1 EMA ${fp}</span><span class="ema-val">${fmt(fast,d)}</span>${tag(pvF)}</div><div class="ema-row"><span class="ema-label">H1 EMA ${sp}</span><span class="ema-val">${fmt(slow,d)}</span>${tag(pvS)}</div><div class="ema-row"><span class="ema-label">H1 STATE</span><span class="ema-val" style="color:var(--muted)">${html(bias)}</span><span class="tag neutral">${html(src.replace(/_/g,' ').toUpperCase())}</span></div></div>`;}

function tagTone(v){v=String(v||'').toLowerCase(); if(['valid','confirmed_by_atr','true','with','live'].includes(v))return 'valid'; if(['low_rr','atr_unconfirmed','move_too_small_vs_atr','atr_unavailable','atr_required_but_unavailable','false'].includes(v))return 'warn'; if(['long','buy_retest','buy_pp_retest','buy_rejection'].includes(v))return 'bull'; if(['short','sell_retest','sell_pp_retest','sell_rejection'].includes(v))return 'bear'; return 'neutral';}
function atrBlock(pv,pair){const a=pv?.atr_confirmation||{}; if(!a||Object.keys(a).length===0)return''; const confirmed=a.confirmed===true?'confirmed':a.confirmed===false?'unconfirmed':'unavailable'; const cls=a.confirmed===true?'valid':a.confirmed===false?'warn':'neutral'; const actual=Number.isFinite(n(a.actual_move))?`${Math.abs(pips(n(a.actual_move),pair))}p`:'--'; const req=Number.isFinite(n(a.required_move))?`${Math.abs(pips(n(a.required_move),pair))}p`:'--'; const atr=Number.isFinite(n(a.atr5))?`${Math.abs(pips(n(a.atr5),pair))}p ATR5`:'ATR5 --'; const cand=html(a.candidate_state||''), fin=html(a.final_state||''); return `<div class="atr"><div class="atr-row"><span class="atr-label">ATR CONF</span><span class="tag ${cls}">${confirmed}</span><span class="tag neutral">${atr}</span></div><div class="atr-row"><span class="atr-label">MOVE</span><span class="atr-val">${actual} / ${req}</span><span class="tag ${cls}" title="${html(a.basis||'')}">${html(a.reason||'')}</span></div>${cand&&fin&&cand!==fin?`<div class="atr-row"><span class="atr-label">GATED</span><span class="tag warn">${cand} → ${fin}</span></div>`:''}</div>`;}
function planBlock(pv,pair){const p=pv?.trade_plan||{}; if(!p||Object.keys(p).length===0)return''; if(p.enabled===false)return`<div class="plan"><div class="plan-row"><span class="plan-label">PLAN</span><span class="tag neutral">disabled</span></div></div>`; const d=DEC[pair]||5; const action=String(p.action||'observe'), quality=String(p.quality||'none'); const rr=p.risk_reward||{}; const rrBest=Number.isFinite(n(rr.best))?n(rr.best).toFixed(2):'--'; const zone=p.entry_zone||null; const zoneText=zone&&Number.isFinite(n(zone.low))&&Number.isFinite(n(zone.high))?`${fmt(zone.low,d)}–${fmt(zone.high,d)}`:'--'; const tp=Array.isArray(p.take_profit)?p.take_profit:[]; const tpText=tp.length?tp.map(x=>fmt(x,d)).join(' / '):'--'; const actionCls=tagTone(action); const qualityCls=quality==='valid'?'valid':quality==='none'?'neutral':'warn'; return `<div class="plan"><div class="plan-row"><span class="plan-label">PLAN</span><span class="tag ${actionCls}">${html(action.replace(/_/g,' '))}</span><span class="tag ${qualityCls}">${html(quality.replace(/_/g,' '))}</span></div><div class="plan-row"><span class="plan-label">ENTRY</span><span class="plan-val">${fmt(p.entry,d)}</span><span class="tag live">zone ${zoneText}</span></div><div class="plan-row"><span class="plan-label">SL</span><span class="plan-val">${fmt(p.stop_loss,d)}</span><span class="tag neutral">RR ${rrBest}</span></div><div class="plan-row"><span class="plan-label">TP</span><span class="plan-val">${tpText}</span></div>${p.invalidation?`<div class="plan-note">Invalidation: ${html(p.invalidation)}</div>`:''}</div>`;}
function missingCard(pair,price,detail){const d=DEC[pair]||5;return `<div class="card missing"><div class="head"><span class="pair">${LABEL[pair]||pair.toUpperCase()}</span><div class="right"><span class="price">${fmt(price,d)}</span><span class="badge bear">missing OHLC</span></div></div><div class="ladder"><div class="missing-box"><div class="missing-title">Pivot ladder unavailable</div>${html(detail)}</div></div></div>`;}
function render(pivots,macro,rates){const grid=document.getElementById('grid'), loader=document.getElementById('loader'), err=document.getElementById('error'); grid.innerHTML=''; err.style.display='none'; const live=liveMap(rates); let count=0;
  PAIRS.forEach(pair=>{const pv=pivots?.pairs?.[pair]||null; const bias=macro?.pair_biases?.[pair]||{}; const ctx=macro?.price_context?.[pair]||bias.price_context||{}; const ema=getEma(macro,pair); const d=DEC[pair]||5; const has=!!(pv&&Number.isFinite(val(pv,['PP'],NaN))); const price=Number.isFinite(live[pair])?live[pair]:val(pv,['price_used','current_price'],val(macro?.price_current,[pair],NaN));
    if(!has){grid.innerHTML+=missingCard(pair,price,`pivot_levels.json has no usable server-computed pivots for ${pair}`);count++;return;}
    const levels=['R3','R2','R1','PP','S1','S2','S3'].map(k=>({key:k,price:val(pv,[k,k.toLowerCase()],NaN),type:k==='PP'?'pp':k[0].toLowerCase()})).filter(x=>Number.isFinite(x.price));
    const yH=derivedDailyHigh(pv), yL=derivedDailyLow(pv), yC=val(pv,['close','C'],NaN); if(Number.isFinite(yH))levels.push({key:'H',price:yH,type:'h',yday:true}); if(Number.isFinite(yC))levels.push({key:'C',price:yC,type:'c',yday:true}); if(Number.isFinite(yL))levels.push({key:'L',price:yL,type:'l',yday:true}); levels.sort((a,b)=>b.price-a.price);
    let nearest='', min=Infinity; levels.forEach(l=>{l.dp=pips(l.price-price,pair);l.ad=Math.abs(l.dp);if(l.ad<min){min=l.ad;nearest=l.key;}}); const kill=min<10;
    const sHigh=val(macro?.price_session_ohlc?.[pair],['high'],NaN), sLow=val(macro?.price_session_ohlc?.[pair],['low'],NaN); const hasRange=Number.isFinite(sHigh)&&Number.isFinite(sLow)&&sHigh!==sLow;
    function touched(l){if(l.yday)return false; if(hasRange){if(l.key[0]==='R')return sHigh>=l.price;if(l.key[0]==='S')return sLow<=l.price;if(l.key==='PP')return sHigh>=l.price&&sLow<=l.price;} if(l.key[0]==='R')return price>=l.price;if(l.key[0]==='S')return price<=l.price;return false;}
    let ladder='<div class="rail"></div>'; levels.forEach(l=>{const tc=touched(l)?' touched':''; const dc=l.ad<10?'kill':(l.key===nearest?'near':''); const sign=l.dp>=0?'+':'-'; ladder+=`<div class="row ${l.yday?'yday':''}"><div class="dot ${l.type}${tc}"></div><span class="label ${l.type}${tc}">${l.key}</span><span class="lvl-price">${fmt(l.price,d)}</span><span class="dist ${dc}">${dc==='kill'?'⚡ ':sign}${Math.abs(l.dp)}p</span></div>`;});
    const pctH=Number.isFinite(yH)&&yH!==0?((price-yH)/yH)*100:NaN, pctL=Number.isFinite(yL)&&yL!==0?((price-yL)/yL)*100:NaN; const hiLow=Number.isFinite(pctH)&&Number.isFinite(pctL)?`H ${pctH>=0?'+':''}${pctH.toFixed(2)}% · L ${pctL>=0?'+':''}${pctL.toFixed(2)}%`:'H/L --'; const hiLowCls=Number.isFinite(yH)&&Number.isFinite(yL)?(price>=(yH+yL)/2?'bull':'bear'):'neutral';
    const state=String(pv.price_state||ctx.price_state||'').toLowerCase(); const align=String(pv.macro_alignment||ctx.macro_alignment||'neutral').toLowerCase(); const score=Number(bias.score??pv.macro_score??0)||0; const conv=val(pv,['combined_conviction_mult','conviction_mult'],1); const sigTone=toneFrom(score,state,align); const nearName=pv.nearest_level?.name||nearest; const rsi=getRsi(pv,ctx,ema); const atrHtml=atrBlock(pv,pair); const planHtml=planBlock(pv,pair); const basis=String(pv.state_basis||'').toLowerCase(); const basisCls=basis.includes('no_live')?'warn':basis==='live'?'live':'neutral'; const move=Number.isFinite(previousLive[pair])?(price>previousLive[pair]?'flash-up':price<previousLive[pair]?'flash-down':''):''; previousLive[pair]=price;
    const source=[pv.ohlc_date?`OHLC ${pv.ohlc_date}`:'',pv.ohlc_source||'',pv.atr_confirmation?'ATR confirm':'',pv.trade_plan?'pivot plan':'',rsi.source&&rsi.tf==='D1'?`RSI ${rsi.source}`:''].filter(Boolean).map(html).join(' · ');
    grid.innerHTML+=`<div class="card ${kill?'kill':''}"><div class="head"><span class="pair">${LABEL[pair]}</span><div class="right"><div><span class="price">${fmt(price,d)}</span><span class="arrow ${price>=yC?'up':'down'}">${price>=yC?'▲':'▼'}</span></div><div class="badge ${hiLowCls}" title="Distance from previous daily high/low">${hiLow}</div></div></div><div class="ladder">${ladder}<div class="now ${move}"><span class="now-label">NOW</span><span class="now-price">${fmt(price,d)}</span></div><div class="box"><div class="line"><span class="badge ${score>0.1?'bull':score<-0.1?'bear':'neutral'}">${score>0?'+':''}${score.toFixed(2)} ×${conv.toFixed(2)}</span><span class="tag ${align==='with'?'with':align==='against'?'against':'neutral'}">${html(align)}</span></div><div class="line"><span class="signal ${sigTone}">● ${html(prettyState(state,nearName))}</span><span class="tag">${html(state||'no-state')}</span></div><div class="line"><span class="tag ${kill?'warn':'neutral'}">nearest <b>${html(nearName)}</b> · ${Math.abs(min)}p</span><span class="tag ${basisCls}">${html(pv.state_basis||'')}</span></div>${pv.reason?`<div class="line"><span class="tag warn">${html(pv.reason)}</span></div>`:''}${atrHtml}${planHtml}${rsiBlock(rsi)}${emaBlock(ema,pair)}</div>${source?`<div class="source">${source}</div>`:''}</div></div>`; count++;});
  loader.style.display='none'; if(!count){err.textContent='No pivot data available.';err.style.display='block';grid.style.display='none';}else grid.style.display='grid';
}
async function refresh(){const [pivots,macro,rates]=await Promise.all([fetchJSON('pivot_levels.json'),fetchJSON('macro_components.json'),fetchJSON('rates.json')]); if(!pivots&&!macro&&!rates){document.getElementById('loader').style.display='none'; const e=document.getElementById('error'); e.textContent='Failed to load pivot_levels.json, macro_components.json, and rates.json.'; e.style.display='block'; return;} latestGenerated=pivots?.generated_at||macro?.scrape_time||rates?.fetched_at||null; document.getElementById('generated-age').innerHTML=`Generated <strong>${relTime(latestGenerated)}</strong>`; render(pivots,macro,rates); countdown=60;}
function tick(){document.getElementById('countdown').textContent=countdown; if(countdown<=0)refresh(); else countdown--;}
updateClock(); setInterval(updateClock,1000); refresh(); setInterval(tick,1000);
</script>
